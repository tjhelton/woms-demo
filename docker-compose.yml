services:
  woms:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SC_API_TOKEN=${SC_API_TOKEN}
      - SC_API_BASE=${SC_API_BASE:-https://api.safetyculture.io}
      - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS:-10}
      - DB_PATH=/app/data/issuetracker.db
    volumes:
      - woms_db:/app/data
      - woms_uploads:/app/static/uploads
    restart: unless-stopped

volumes:
  woms_db:
  woms_uploads:
